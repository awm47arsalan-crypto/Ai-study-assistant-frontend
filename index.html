  <script>
    // Replace with your Render backend URL
    const BACKEND_URL = 'https://ai-study-assistant-l09p.onrender.com/generate';

    let currentFeature = 'notes';

    const toolTitles = {
      notes: '📘 Notes Generator',
      summary: '📝 Summary Maker',
      quiz: '🧠 Quiz Generator',
      doubt: '❓ Doubt Solver',
      diagram: '📊 Diagram Explainer'
    };

    function openTool(feature) {
      currentFeature = feature;
      document.getElementById('home').classList.remove('active');
      document.getElementById('toolSection').classList.add('active');
      document.getElementById('toolTitle').textContent = toolTitles[feature];
      document.getElementById('topicInput').value = '';
      document.getElementById('outputText').innerHTML = 'Enter a topic and click Generate.';
      document.getElementById('diagramContainer').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goHome() {
      document.getElementById('toolSection').classList.remove('active');
      document.getElementById('home').classList.add('active');
      window.location.hash = 'home';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function generateContent() {
      const topic = document.getElementById('topicInput').value.trim();
      const output = document.getElementById('outputText');
      const button = document.getElementById('generateBtn');
      const diagramContainer = document.getElementById('diagramContainer');
      const diagram = document.getElementById('diagram');

      if (!topic) {
        output.innerHTML = 'Please enter a topic first.';
        return;
      }

      button.disabled = true;
      button.textContent = 'Generating...';
      output.innerHTML = '🧠 StudyAI is thinking...';
      diagramContainer.classList.add('hidden');

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic,
            feature: currentFeature
          })
        });

        const data = await response.json();

        if (data.success) {
          output.innerHTML = marked.parse(data.result || 'No response received.');

          if (data.diagram) {
            diagramContainer.classList.remove('hidden');
            const id = 'mermaid-' + Date.now();
            const render = await mermaid.render(id, data.diagram);
            diagram.innerHTML = render.svg;
          }
        } else {
          output.innerHTML = data.error || 'Something went wrong.';
        }
      } catch (error) {
        output.innerHTML = '❌ Failed to connect to backend.';
        console.error(error);
      } finally {
        button.disabled = false;
        button.textContent = 'Generate with AI';
      }
    }

    async function copyOutput() {
      const text = document.getElementById('outputText').innerText;
      await navigator.clipboard.writeText(text);
    }

    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    // Support direct URLs like #notes, #summary
    const hash = window.location.hash.replace('#', '');
    if (toolTitles[hash]) {
      openTool(hash);
    }
  </script>
